<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS PWA Detection Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .ios { background-color: #e8f5e8; border-color: #4caf50; }
        .android { background-color: #e3f2fd; border-color: #2196f3; }
        .other { background-color: #f3e5f5; border-color: #9c27b0; }
    </style>
</head>
<body>
    <h1>iOS PWA Detection Test</h1>
    <div id="results"></div>

    <script>
        function runDetectionTest() {
            const results = document.getElementById('results');
            
            // Detection functions (matching our app)
            const isIOS = () => {
                return /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                       (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            };

            const isIOSSafari = () => {
                const ua = navigator.userAgent.toLowerCase();
                return isIOS() && /safari/.test(ua) && !/chrome|crios|fxios/.test(ua);
            };

            const isAndroid = () => {
                return /android/i.test(navigator.userAgent);
            };

            const isStandalone = () => {
                return window.matchMedia('(display-mode: standalone)').matches || 
                       window.navigator.standalone === true;
            };

            // Display results
            const info = [
                { label: 'User Agent', value: navigator.userAgent },
                { label: 'Platform', value: navigator.platform },
                { label: 'Max Touch Points', value: navigator.maxTouchPoints },
                { label: 'Is iOS', value: isIOS() },
                { label: 'Is iOS Safari', value: isIOSSafari() },
                { label: 'Is Android', value: isAndroid() },
                { label: 'Is Standalone', value: isStandalone() },
                { label: 'Navigator Standalone', value: window.navigator.standalone },
                { label: 'BeforeInstallPrompt Support', value: 'onbeforeinstallprompt' in window }
            ];

            info.forEach(item => {
                const div = document.createElement('div');
                div.className = 'result';
                if (item.label === 'Is iOS' && item.value) {
                    div.className += ' ios';
                } else if (item.label === 'Is Android' && item.value) {
                    div.className += ' android';
                } else {
                    div.className += ' other';
                }
                div.innerHTML = `<strong>${item.label}:</strong> ${item.value}`;
                results.appendChild(div);
            });

            // Test if we should show install button
            const shouldShowInstall = isIOSSafari() && !isStandalone();
            const div = document.createElement('div');
            div.className = 'result ' + (shouldShowInstall ? 'ios' : 'other');
            div.innerHTML = `<strong>Should Show Install Button:</strong> ${shouldShowInstall}`;
            results.appendChild(div);
        }

        // Run test when page loads
        runDetectionTest();
    </script>
</body>
</html>
